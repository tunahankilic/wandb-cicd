name: CI workflow

on: [push]
jobs:
  my-first-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Job status
        run: | 
          echo "hello world"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --locked --all-extras --dev
        
      - name: Run python script
        run: |
          uv run ci.py
